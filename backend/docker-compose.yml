services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crisislens
      POSTGRES_USER: crisislens
      POSTGRES_PASSWORD: crisislens_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crisislens"]
      interval: 5s
      retries: 5
volumes:
  pgdata:
